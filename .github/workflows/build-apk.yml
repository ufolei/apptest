name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk ant libffi-dev libssl-dev zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev libgdbm-dev libdb5.3-dev libbz2-dev libexpat1-dev liblzma-dev tk-dev
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "kivy>=2.3.0" buildozer==1.5.0
    
    - name: Show environment info
      run: |
        python --version
        java -version
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        ls -la $ANDROID_HOME
        ls -la $ANDROID_NDK_HOME
    
    - name: Build APK (full output)
      run: |
        buildozer android debug apk 2>&1
    
    - name: Debug - List all files in build directory
      run: |
        echo "=== Current directory ==="
        ls -la
        echo ""
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Buildozer directory structure ==="
        ls -la .buildozer/ 2>/dev/null || echo "No buildozer dir"
        ls -la .buildozer/android/ 2>/dev/null || echo "No android dir"
        ls -la .buildozer/android/platform/ 2>/dev/null || echo "No platform dir"
        echo ""
        echo "=== Checking dists ==="
        ls -la .buildozer/android/platform/build-*/dists/ 2>/dev/null || echo "No dists dir"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-apk
        path: |
          **/*.apk
