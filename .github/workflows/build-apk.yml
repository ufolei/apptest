name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk ant
        python -m pip install --upgrade pip
        pip install buildozer Cython kivy

    # 🔥 强制清空系统 Android 环境，让 buildozer 自己装正确版本
    - name: Unset system Android env
      run: |
        echo "ANDROID_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV

    - name: Build APK
      run: |
        buildozer android debug

    - name: Find APK
      run: find . -name *.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-apk
        path: bin/*.apk
